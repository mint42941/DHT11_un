<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .card {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 35px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .btn-start {
            background: linear-gradient(135deg, #4a6cf7 0%, #3b59d4 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(74, 108, 247, 0.3);
            width: 80%;
            margin: 0 auto;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 108, 247, 0.4);
        }

        .btn-start:disabled {
            background: #a0aec0;
            box-shadow: none;
            cursor: not-allowed;
        }

        #webcam-container {
            margin: 25px auto;
            border-radius: 16px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #f1f3f5;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            border: 4px solid #ffffff;
        }

        #webcam-container canvas {
            display: block;
            border-radius: 12px;
        }

        #label-container {
            margin-top: 25px;
            text-align: left;
        }

        .prediction-item {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .prediction-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
            font-size: 14px;
        }

        .progress-bar {
            background-color: #e2e8f0;
            border-radius: 999px;
            height: 10px;
            width: 100%;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            height: 100%;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Teachable Machine Image Model</h1>
    <button type="button" class="btn-start" onclick="init()">Start Camera</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    // ลิงก์โมเดลของคุณ
    const URL = "https://teachablemachine.withgoogle.com/models/CNTSCzzKD/";

    let model, webcam, labelContainer, maxPredictions;
    let predictTimer = null;

    async function init() {
        const startBtn = document.querySelector('.btn-start');
        startBtn.innerText = "Loading Model...";
        startBtn.disabled = true;

        try {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // 1. โหลดโมเดล
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // 2. ตั้งค่ากล้อง
            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip); 
            
            startBtn.innerText = "Requesting Camera...";
            await webcam.setup(); // ขั้นตอนนี้ระบบจะขออนุญาตเข้าถึงกล้อง
            await webcam.play();
            
            window.requestAnimationFrame(loop);

            // ซ่อนปุ่มเมื่อทุกอย่างพร้อม
            startBtn.style.display = "none";

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            
            for (let i = 0; i < maxPredictions; i++) {
                const item = document.createElement("div");
                item.className = "prediction-item";
                item.innerHTML = `
                    <div class="prediction-info">
                        <span class="class-name">-</span>
                        <span class="class-percent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                `;
                labelContainer.appendChild(item);
            }

            predict();

            if(predictTimer) clearInterval(predictTimer);
            predictTimer = setInterval(predict, 3000);

        } catch (error) {
            console.error(error);
            // แสดงป๊อปอัปเตือนให้รู้ว่าเป็นอะไร
            alert("เกิดข้อผิดพลาด: " + error.message + "\n\nกรุณาตรวจสอบว่า:\n1. ได้กดยอมรับให้เว็บเข้าถึงกล้องแล้วหรือยัง\n2. ลิงก์โมเดลถูกต้องและอัปเดตแล้วใน Teachable Machine");
            startBtn.innerText = "Try Again";
            startBtn.disabled = false;
        }
    }

    async function loop() {
        webcam.update(); 
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        if (!model || !webcam) return;

        const prediction = await model.predict(webcam.canvas);
        const items = labelContainer.getElementsByClassName("prediction-item");

        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = prediction[i].probability;
            const percentText = (probability * 100).toFixed(0) + "%";

            items[i].querySelector(".class-name").innerText = className;
            items[i].querySelector(".class-percent").innerText = percentText;
            items[i].querySelector(".progress-fill").style.width = percentText;
        }
    }
</script>
</body>
</html>
